<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD3L Skin Viewer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            text-align: center;
        }
        #loading.hidden { display: none; }
    </style>
</head>
<body>
    <div id="loading">Loading skin...</div>
    <canvas id="skin_container"></canvas>

    <!-- skinview3d CDN -->
    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.0.1/bundles/skinview3d.min.js"></script>

    <script>
    (function() {
        "use strict";

        // ── URL 参数解析 ──────────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const uuid    = params.get("uuid") || "";
        const skinUrl = params.get("skinUrl") || "";
        const slim    = params.get("slim") === "true";
        const walk    = params.get("walk") !== "false";

        // ── 皮肤 URL 解析优先级 ──────────────────────────────────────
        function resolveSkinUrl(uid, url) {
            if (url && url.length > 5 && url !== "null" && url !== "undefined") return url;
            if (uid && uid.length > 0)  return "https://crafatar.com/skins/" + uid.replace(/-/g, "");
            return "https://crafatar.com/skins/ec561538f3fd461daff5086b22154bce"; // Steve fallback
        }

        // ── 初始化 3D 渲染器 ─────────────────────────────────────────
        const canvas = document.getElementById("skin_container");
        const loading = document.getElementById("loading");

        const viewer = new skinview3d.SkinViewer({
            canvas: canvas,
            width: window.innerWidth,
            height: window.innerHeight,
            skin: resolveSkinUrl(uuid, skinUrl),
            model: slim ? "slim" : "default",
            fov: 28,
            zoom: 0.85,
        });

        // ── 行走骨骼动画 (Walking Animation) ─────────────────────────
        if (walk) {
            viewer.animation = new skinview3d.WalkingAnimation();
            viewer.animation.speed = 0.6;
            viewer.animation.headBobbing = true;
        }

        // ── 交互控制 ─────────────────────────────────────────────────
        viewer.autoRotate = false;
        viewer.controls.enableRotate = true;
        viewer.controls.enableZoom = true;
        viewer.controls.enablePan = false;

        // ── 初始摄像机角度 ───────────────────────────────────────────
        viewer.camera.rotation.x = -0.1;
        viewer.camera.rotation.y =  0.5;

        // 隐藏 loading
        loading.classList.add("hidden");

        // ── 窗口尺寸响应 ─────────────────────────────────────────────
        window.addEventListener("resize", function() {
            viewer.width  = window.innerWidth;
            viewer.height = window.innerHeight;
        });

        // ── JS Bridge: 供 Java/CefBrowser executeJavaScript 调用 ────
        window.updateSkin = function(newUuid, newUrl) {
            var url = resolveSkinUrl(newUuid, newUrl);
            viewer.loadSkin(url);
        };

        window.setAnimation = function(type) {
            switch (type) {
                case "walk":
                    viewer.animation = new skinview3d.WalkingAnimation();
                    viewer.animation.speed = 0.6;
                    break;
                case "run":
                    viewer.animation = new skinview3d.RunningAnimation();
                    viewer.animation.speed = 0.8;
                    break;
                case "idle":
                    viewer.animation = new skinview3d.IdleAnimation();
                    break;
                default:
                    viewer.animation = null;
            }
        };

        window.setModel = function(model) {
            viewer.loadSkin(viewer.skinUrl, { model: model });
        };

        window.resetCamera = function() {
            viewer.camera.rotation.x = -0.1;
            viewer.camera.rotation.y =  0.5;
            viewer.zoom = 0.85;
        };
    })();
    </script>
</body>
</html>
