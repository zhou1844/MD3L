<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD3L Skin Viewer</title>
    <!-- 最早拦截所有 JS 异常，防止 JavaFX 弹原生对话框 -->
    <script>window.onerror = function(m,s,l,c,e){ return true; };</script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        #skin_container {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        #skin_container canvas {
            display: block;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            text-align: center;
        }
        #loading.hidden { display: none; }
    </style>
</head>
<body>
    <div id="loading">Loading skin...</div>
    <div id="skin_container"></div>

    <!-- skinview3d local bundle -->
    <script src="skinview3d.bundle.js"></script>

    <script>
    (function() {
        "use strict";

        // ── URL 参数解析（兼容直接浏览器打开） ────────────────────────
        const params = new URLSearchParams(window.location.search);
        const uuid    = params.get("uuid") || "";
        const slim    = params.get("slim") === "true";
        const walk    = (window.__MD3L_WALK__ !== undefined) ? window.__MD3L_WALK__ : (params.get("walk") !== "false");

        // ── 皮肤 URL 解析：优先使用 Java 注入的全局变量 ──────────────
        function resolveSkinUrl(uid, url) {
            // Java 侧注入的皮肤 URL（data: URI 或 https://）
            var injected = window.__MD3L_SKIN_URL__ || url || params.get("skinUrl") || "";
            if (injected && injected.length > 5 && injected !== "null" && injected !== "undefined") return injected;
            if (uid && uid.length > 0) return "https://crafatar.com/skins/" + uid.replace(/-/g, "");
            return "https://crafatar.com/skins/ec561538f3fd461daff5086b22154bce";
        }

        const container = document.getElementById("skin_container");
        const loading = document.getElementById("loading");
        var viewer = null;

        // ── 先建 canvas 加入 DOM，再传给 SkinViewer ────────────────
        function initViewer() {
            var w = (window.__MD3L_W__ > 0) ? parseInt(window.__MD3L_W__) : 800;
            var h = (window.__MD3L_H__ > 0) ? parseInt(window.__MD3L_H__) : 600;
            // 调试：输出到 setOnAlert（Kotlin 侧会打印到 stdout）
            alert("[SKINDBG] W=" + window.__MD3L_W__ + " H=" + window.__MD3L_H__ + " -> " + w + "x" + h);

            // Step 1: 建 canvas，设 DOM 属性（WebGL 读的是 width/height 属性，不是 CSS）
            var canvas = document.createElement('canvas');
            canvas.width  = w;
            canvas.height = h;
            canvas.style.width  = w + 'px';
            canvas.style.height = h + 'px';
            canvas.style.display = 'block';
            // Step 2: 必须先进 DOM，THREE.js 才能正确创建 WebGL context
            container.appendChild(canvas);

            try {
                viewer = new skinview3d.SkinViewer({
                    canvas: canvas,
                    width:  w,
                    height: h,
                    skin:   resolveSkinUrl(uuid, ""),
                    model:  slim ? "slim" : "default",
                    fov:    28,
                    zoom:   0.85,
                });
            } catch(e) {
                console.warn("SkinViewer init failed:", e);
                return;
            }

            // ── 行走骨骼动画 ──────────────────────────────────────────
            if (walk) {
                viewer.animation = new skinview3d.WalkingAnimation();
                viewer.animation.speed = 0.6;
                viewer.animation.headBobbing = true;
            }

            // ── 交互控制 ──────────────────────────────────────────────
            viewer.autoRotate = false;
            viewer.controls.enableRotate = true;
            viewer.controls.enableZoom   = true;
            viewer.controls.enablePan    = false;

            // ── 初始摄像机角度 ────────────────────────────────────────
            viewer.camera.rotation.x = -0.1;
            viewer.camera.rotation.y =  0.5;

            loading.classList.add("hidden");
        }

        // ── 窗口尺寸响应 ──────────────────────────────────────────────
        window.addEventListener("resize", function() {
            if (!viewer) return;
            var w = container.clientWidth  || window.innerWidth  || 800;
            var h = container.clientHeight || window.innerHeight || 600;
            if (w > 0 && h > 0) { viewer.width = w; viewer.height = h; }
        });

        // ── JS Bridge ────────────────────────────────────────────────
        window.updateSkin = function(newUuid, newUrl) {
            var url = resolveSkinUrl(newUuid, newUrl);
            if (viewer) viewer.loadSkin(url);
        };

        window.setAnimation = function(type) {
            if (!viewer) return;
            switch (type) {
                case "walk":
                    viewer.animation = new skinview3d.WalkingAnimation();
                    viewer.animation.speed = 0.6;
                    break;
                case "run":
                    viewer.animation = new skinview3d.RunningAnimation();
                    viewer.animation.speed = 0.8;
                    break;
                case "idle":
                    viewer.animation = new skinview3d.IdleAnimation();
                    break;
                default:
                    viewer.animation = null;
            }
        };

        window.setModel = function(model) {
            if (viewer) viewer.loadSkin(viewer.skinUrl, { model: model });
        };

        window.resetCamera = function() {
            if (!viewer) return;
            viewer.camera.rotation.x = -0.1;
            viewer.camera.rotation.y =  0.5;
            viewer.zoom = 0.85;
        };

        // 页面加载完成后立即初始化（尺寸已由 Kotlin 注入，无需等待 DOM 布局）
        window.addEventListener("load", initViewer);
    })();
    </script>
</body>
</html>
